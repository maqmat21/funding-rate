name: Macro & Portfolio Analysis v1.2

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests pandas numpy scikit-learn yfinance beautifulsoup4

      - name: Execute Full Trading Analysis
        run: |
          git config --global user.name "MacroBot"
          git config --global user.email "bot@macro-engine.com"
          
          # Ejecutar el pipeline consolidado (DXY, Noticias, Binance y Reporte)
          echo "Ejecutando run_full_analysis.py..."
          python run_full_analysis.py --output-dir full_analysis_output_v2
          
          # Commit y Push del reporte generado
          git add full_analysis_output_v2/ macro_engine.json macro_history_state.json
          git commit -m "Auto-update Analysis: $(date)" || echo "No hay cambios para subir"
          git push || echo "Error en push"
