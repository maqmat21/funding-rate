name: Macro & Portfolio Analysis v1.2

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests pandas numpy scikit-learn yfinance beautifulsoup4

      - name: Execute Pipeline and Scripts
        run: |
          git config --global user.name "MacroBot"
          git config --global user.email "bot@macro-engine.com"
          
          # 1. Ejecutar DXY Script (una vez)
          echo "Ejecutando DXY.py..."
          python DXY.py
          
          # 2. Ejecutar Pipeline Sirena v2 (una vez)
          echo "Ejecutando run_full_analysis_v2.py..."
          python run_full_analysis_v2.py
          
          # 3. Commit y Push final de todos los resultados
          git add macro_engine.json macro_history_state.json full_analysis_output_v2/
          git commit -m "Auto-update Macro & Portfolio: $(date)" || echo "No hay cambios para subir"
          
          # Push único al final
          git push || echo "Error en push"
